# ============================================
# QED-Tracker 配置模板
# 复制为 setting.ini 并根据本地环境修改
# ============================================

[Paths]
base_path = .
dataset_dir = dataset

[Postgres]
host = localhost
port = 5432
database = qed_tracker
user = postgres
password = your_password_here

[LLM]
evaluation_provider = local
local_api_base = http://127.0.0.1:5001/v1
local_api_key = lm-studio
local_model = qwen/qwen3.5-9b

[Discovery]
search_keywords = 数学分析, 实变函数, 泛函分析, 复变函数, 偏微分方程
arxiv_math_domains = math.CA, math.FA, math.AP, math.CV

[GitHub]
token =

[Logging]
level = INFO
