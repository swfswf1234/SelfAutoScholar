# ============================================
# SelfAutoScholar 配置文件
# 路径相对于项目根目录
# ============================================

[Paths]
# 项目根目录 (自动检测，通常不需要修改)
base_path = .
# 数据存储目录
downloads_dir = data/downloads
# Markdown 导出目录
exports_dir = exports/markdown
# 日志目录
logs_dir = logs
# Obsidian Vault 目录 (可选)
obsidian_dir = obsidian_vault

[Postgres]
host = localhost
port = 5432
database = selfautoscholar
user = postgres
password = 123456
sslmode = disable

[MCP]
base_url = http://127.0.0.1:5001
api_key = your_api_key_here
auth_header = X-API-Key

[LLM]
# 本地 LLM (LM Studio)
local_api_base = http://127.0.0.1:5001/v1
local_api_key = lm-studio
local_model = qwen/qwen3.5-9b
# 外部 LLM API (用于评估)
external_api_base = https://api.openai.com/v1
external_api_key = sk-xxx
external_model = gpt-4o

[Discovery]
# 搜索关键词 (逗号分隔)
search_keywords = LLM, Large Language Model, NLP, Machine Learning
# 每个关键词最大候选数
max_candidates = 5
# 每日最大下载数 (Top N)
max_downloads = 10

[Scheduler]
enabled = true
cron = 0 0 * * *
timezone = Asia/Shanghai

[API]
enable = true
port = 8001
host = 0.0.0.0

[Security]
api_key = your_api_key_here
jwt_secret = replace_me_please
jwt_algorithm = HS256

[Logging]
level = INFO
log_to_console = true
rotation = daily
max_size_mb = 50

[User]
default_user = default
